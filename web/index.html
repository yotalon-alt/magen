<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- Cache Control -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="version" content="3.1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="flutter_application_1">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>משוב מבצר</title>
  <link rel="manifest" href="manifest.json">
  
  <script>
    // בדיקת תמיכה ב-Web Speech API
    console.log('🔍 Checking Web Speech API support...');
    
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      console.error('❌ Web Speech API not supported in this browser');
      console.log('💡 Please use Chrome, Edge, or Safari');
    } else {
      console.log('✅ Web Speech API is supported');
    }
    
    // בדיקת הרשאות מיקרופון
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      console.log('✅ getUserMedia API available');
    } else {
      console.error('❌ getUserMedia API not available');
      console.log('💡 Make sure you are using HTTPS or localhost');
    }
    
    // בדיקת פרוטוקול
    if (window.location.protocol === 'https:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
      console.log('✅ Running on secure context (HTTPS/localhost)');
    } else {
      console.warn('⚠️ Not running on secure context - microphone may not work');
      console.log('💡 Use HTTPS or localhost for microphone access');
    }
  </script>
</head>
<body>
  <script>
    let recognition = null;
    let currentCallback = null;
    let currentErrorCallback = null;

    window.startWebSpeechRecognition = function(callback, errorCallback) {
      console.log('🎤 startWebSpeechRecognition called');
      currentCallback = callback;
      currentErrorCallback = errorCallback;

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      
      if (!SpeechRecognition) {
        console.error('❌ Speech Recognition not supported');
        if (errorCallback) errorCallback('Speech Recognition not supported');
        return;
      }

      try {
        recognition = new SpeechRecognition();
        recognition.lang = 'he-IL';
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = function() {
          console.log('🎤 Speech recognition started');
        };

        recognition.onresult = function(event) {
          const transcript = event.results[0][0].transcript;
          console.log('📝 Recognized:', transcript);
          if (callback) callback(transcript);
        };

        recognition.onerror = function(event) {
          console.error('❌ Speech recognition error:', event.error);
          if (event.error === 'not-allowed') {
            if (errorCallback) errorCallback('Microphone permission denied');
          } else if (event.error === 'no-speech') {
            if (errorCallback) errorCallback('No speech detected');
          } else {
            if (errorCallback) errorCallback(event.error);
          }
        };

        recognition.onend = function() {
          console.log('🔴 Speech recognition ended');
          recognition = null;
        };

        recognition.start();
        console.log('✅ Recognition started successfully');
      } catch (error) {
        console.error('❌ Failed to start recognition:', error);
        if (errorCallback) errorCallback(error.message);
      }
    };

    window.stopWebSpeechRecognition = function() {
      console.log('🛑 stopWebSpeechRecognition called');
      if (recognition) {
        try {
          recognition.stop();
          recognition = null;
        } catch (error) {
          console.error('❌ Error stopping recognition:', error);
        }
      }
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
